AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Vigil read-only IAM role. Grants the Vigil control plane the minimum
  permissions to enumerate IAM, S3, and KMS configuration. No write
  permissions. No AWS-managed SecurityAudit or ViewOnlyAccess attached.

Parameters:
  HygieneAccountPrincipal:
    Type: String
    Description: ARN of the Vigil control plane principal (provided during onboarding).
  ExternalId:
    Type: String
    Description: Unique ExternalId issued at onboarding. Required to assume the role.
    NoEcho: true
  RoleName:
    Type: String
    Default: VigilReadOnly
    Description: Name of the IAM role created in this account.

Resources:
  VigilRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref HygieneAccountPrincipal
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: VigilMinimalReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: IamUserAndKeyEnumeration
                Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListMFADevices
                  - iam:GetLoginProfile
                  - iam:ListAccessKeys
                  - iam:GetAccessKeyLastUsed
                  - iam:GetAccountSummary
                  - iam:ListAccountAliases
                  - iam:GetAccountPasswordPolicy
                Resource: "*"

              - Sid: IamRoleEnumeration
                Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:ListRolePolicies
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                Resource: "*"

              - Sid: IamServiceLastAccessed
                Effect: Allow
                Action:
                  - iam:GenerateServiceLastAccessedDetails
                  - iam:GetServiceLastAccessedDetails
                Resource: "*"

              - Sid: S3BucketConfiguration
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLogging
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketVersioning
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                Resource: "*"

              - Sid: KmsKeyConfiguration
                Effect: Allow
                Action:
                  - kms:ListKeys
                  - kms:DescribeKey
                  - kms:GetKeyRotationStatus
                  - kms:GetKeyPolicy
                  - kms:ListAliases
                Resource: "*"

              - Sid: CloudTrailConfiguration
                Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                Resource: "*"

              - Sid: GuardDutyConfiguration
                Effect: Allow
                Action:
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                Resource: "*"

              - Sid: VpcAndSecurityGroupEnumeration
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeVpcs
                  - ec2:DescribeFlowLogs
                  - ec2:DescribeSecurityGroups
                Resource: "*"

              - Sid: Ec2InstanceEnumeration
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:GetEbsEncryptionByDefault
                Resource: "*"

              - Sid: AccessAnalyzerConfiguration
                Effect: Allow
                Action:
                  - access-analyzer:ListAnalyzers
                Resource: "*"

              - Sid: ConfigServiceConfiguration
                Effect: Allow
                Action:
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                  - config:DescribeDeliveryChannels
                Resource: "*"

              - Sid: RdsConfiguration
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                Resource: "*"

              - Sid: OrganizationsAccountLabel
                Effect: Allow
                Action:
                  - organizations:DescribeAccount
                Resource: "*"

Outputs:
  RoleArn:
    Description: Paste this ARN into Vigil to finish onboarding.
    Value: !GetAtt VigilRole.Arn
  ExternalId:
    Description: ExternalId required to assume the role.
    Value: !Ref ExternalId
