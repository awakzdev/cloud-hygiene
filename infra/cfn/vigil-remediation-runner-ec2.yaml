AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Customer-owned remediation runner — modular scoped-write IAM per finding family.
  Lambda + EventBridge deploy only when Security Group remediation is enabled.

Parameters:
  RemediationRoleName:
    Type: String
    Default: VigilRemediationRunnerRole
  LambdaName:
    Type: String
    Default: VigilRemediationRunner
  ExistingRemediationRoleArn:
    Type: String
    Default: ""
  EventBusName:
    Type: String
    Default: default
  RemediationSigningPublicKeyBase64:
    Type: String
    Default: ""
  LambdaArtifactBucket:
    Type: String
    Default: amzn-s3-vigil
  LambdaArtifactKey:
    Type: String
    Default: lambda/remediation_runner.zip
  VigilExecutionWebhookUrl:
    Type: String
    Default: ""
  EnableSecurityGroupRemediation:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
  EnableS3Remediation:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
  EnableIamAccessKeyRemediation:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
  EnableIamPolicyRemediation:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
  EnableCloudTrailRemediation:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]

Conditions:
  CreateRole: !Equals [!Ref ExistingRemediationRoleArn, ""]
  SecurityGroupModule: !Equals [!Ref EnableSecurityGroupRemediation, "Yes"]
  S3Module: !Equals [!Ref EnableS3Remediation, "Yes"]
  IamAccessKeyModule: !Equals [!Ref EnableIamAccessKeyRemediation, "Yes"]
  IamPolicyModule: !Equals [!Ref EnableIamPolicyRemediation, "Yes"]
  CloudTrailModule: !Equals [!Ref EnableCloudTrailRemediation, "Yes"]

Resources:
  RemediationDLQ:
    Condition: SecurityGroupModule
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  RemediationDLQPolicy:
    Condition: SecurityGroupModule
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RemediationDLQ
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt RemediationDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub
                  - "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/${Bus}/${RuleName}"
                  - Bus: !Ref EventBusName
                    RuleName: VigilRemediationApproved

  RemediationRole:
    Condition: CreateRole
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RemediationRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SecurityGroupRemediationPolicy:
    Condition: SecurityGroupModule
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VigilRemediationSecurityGroups
      Roles:
        - !Ref RemediationRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Ec2SecurityGroupIngress
            Effect: Allow
            Action:
              - ec2:RevokeSecurityGroupIngress
              - ec2:AuthorizeSecurityGroupIngress
            Resource: "*"
          - Sid: RemediationExecutionsDynamoDB
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
            Resource: !Sub "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/VigilRemediationExecutions"

  S3RemediationPolicy:
    Condition: S3Module
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VigilRemediationS3
      Roles:
        - !Ref RemediationRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3PublicAccessRemediation
            Effect: Allow
            Action:
              - s3:PutBucketPublicAccessBlock
              - s3:PutBucketPolicy
            Resource: "*"

  IamAccessKeyRemediationPolicy:
    Condition: IamAccessKeyModule
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VigilRemediationIamAccessKeys
      Roles:
        - !Ref RemediationRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: IamAccessKeyRemediation
            Effect: Allow
            Action:
              - iam:UpdateAccessKey
              - iam:DeleteAccessKey
            Resource: "*"

  IamPolicyRemediationPolicy:
    Condition: IamPolicyModule
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VigilRemediationIamPolicy
      Roles:
        - !Ref RemediationRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: IamPolicyRemediation
            Effect: Allow
            Action:
              - iam:PutRolePolicy
              - iam:DetachRolePolicy
              - iam:AttachRolePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
            Resource: "*"

  CloudTrailRemediationPolicy:
    Condition: CloudTrailModule
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VigilRemediationCloudTrail
      Roles:
        - !Ref RemediationRoleName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CloudTrailRemediation
            Effect: Allow
            Action:
              - cloudtrail:UpdateTrail
              - cloudtrail:StartLogging
            Resource: "*"

  RemediationExecutionsTable:
    Condition: SecurityGroupModule
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: VigilRemediationExecutions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: plan_id
          AttributeType: S
      KeySchema:
        - AttributeName: plan_id
          KeyType: HASH

  RemediationFunction:
    Condition: SecurityGroupModule
    Type: AWS::Lambda::Function
    DependsOn:
      - SecurityGroupRemediationPolicy
    Properties:
      FunctionName: !Ref LambdaName
      Runtime: python3.12
      Handler: index.handler
      Role: !If [CreateRole, !GetAtt RemediationRole.Arn, !Ref ExistingRemediationRoleArn]
      Timeout: 120
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          REMEDIATION_SIGNING_PUBLIC_KEY_B64: !Ref RemediationSigningPublicKeyBase64
          VIGIL_EXECUTION_WEBHOOK_URL: !Ref VigilExecutionWebhookUrl
          REMEDIATION_EXECUTIONS_TABLE: VigilRemediationExecutions
      Code:
        S3Bucket: !Ref LambdaArtifactBucket
        S3Key: !Ref LambdaArtifactKey

  RemediationInvokePermission:
    Condition: SecurityGroupModule
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RemediationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt RemediationRule.Arn

  RemediationLogGroup:
    Condition: SecurityGroupModule
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaName}
      RetentionInDays: 30

  RemediationRule:
    Condition: SecurityGroupModule
    Type: AWS::Events::Rule
    Properties:
      Name: VigilRemediationApproved
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - vigil.security
        detail-type:
          - vigil.remediation.approved
        detail:
          schema:
            - vigil_remediation_plan/v2
          check_id:
            - ec2.security_group.unrestricted_ssh
            - ec2.security_group.unrestricted_rdp
          execution:
            runner_type:
              - lambda
      State: ENABLED
      Targets:
        - Arn: !GetAtt RemediationFunction.Arn
          Id: VigilRemediationTarget
          DeadLetterConfig:
            Arn: !GetAtt RemediationDLQ.Arn

Outputs:
  RemediationRoleArn:
    Value: !If [CreateRole, !GetAtt RemediationRole.Arn, !Ref ExistingRemediationRoleArn]
  RemediationFunctionArn:
    Condition: SecurityGroupModule
    Value: !GetAtt RemediationFunction.Arn
  EventBusRegion:
    Value: !Ref AWS::Region
  RemediationExecutionsTableName:
    Condition: SecurityGroupModule
    Value: !Ref RemediationExecutionsTable
