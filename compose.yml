name: vigil

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hygiene}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hygiene}
      POSTGRES_DB: ${POSTGRES_DB:-hygiene}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hygiene}:${POSTGRES_PASSWORD:-hygiene}@db:5432/${POSTGRES_DB:-hygiene}
      REDIS_URL: redis://redis:6379/0
      # Pass-through only — boto3 ignores unset vars; empty strings break credential chain.
      # Set these in .env for static IAM keys, or leave unset to fall through to ~/.aws SSO.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./api:/app
      # Mounted for SSO token cache. Omit this volume if using static keys only.
      - ${HOME}/.aws:/root/.aws:rw

  worker:
    build:
      context: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hygiene}:${POSTGRES_PASSWORD:-hygiene}@db:5432/${POSTGRES_DB:-hygiene}
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_PROFILE: ${AWS_PROFILE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: watchfiles --filter python "celery -A app.worker.celery_app worker --beat --loglevel=info" app
    volumes:
      - ./api:/app
      - ${HOME}/.aws:/root/.aws:rw

  web:
    build:
      context: ./web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:5173:5173"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./web:/app
      - /app/node_modules

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  backup:
    image: postgres:16-alpine
    profiles: ["prod"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hygiene}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hygiene}
      POSTGRES_DB: ${POSTGRES_DB:-hygiene}
      B2_BUCKET: ${B2_BUCKET:-}
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    # Runs once at container start — trigger nightly via cron on the host or
    # via `docker compose --profile prod run --rm backup`
    entrypoint: /bin/sh
    command: >
      -c "
        set -e
        DUMP_FILE=/tmp/vigil_$$(date +%Y%m%d_%H%M%S).dump
        pg_dump -h db -U $$POSTGRES_USER -Fc $$POSTGRES_DB > $$DUMP_FILE
        echo \"Dump written: $$DUMP_FILE ($$(du -sh $$DUMP_FILE | cut -f1))\"
        if [ -n \"$$B2_KEY_ID\" ]; then
          apk add --no-cache curl >/dev/null 2>&1
          echo 'Uploading to Backblaze B2...'
          curl -s -u $$B2_KEY_ID:$$B2_APPLICATION_KEY \\
            -T $$DUMP_FILE \\
            https://s3.us-west-004.backblazeb2.com/$$B2_BUCKET/$$(basename $$DUMP_FILE) \\
            && echo 'Upload complete' || echo 'Upload failed (check B2 credentials)'
        else
          echo 'B2 not configured — dump saved locally only (not persisted outside container)'
        fi
      "
    restart: "no"

volumes:
  db_data:
  caddy_data:
  caddy_config:
